<section class="contact-section">
 

  <form (submit)="sendMessage($event, nameInput.value, emailInput.value, messageInput.value)">
    <div class="form-group">
      <label for="name">Name</label>
      <input id="name" type="text" #nameInput placeholder="Your name" required />
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" #emailInput placeholder="you@example.com" required />
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" rows="2" #messageInput placeholder="Tell me about your project" required></textarea>
    </div>

    <button type="submit">Send message !</button>
  </form>
</section>
