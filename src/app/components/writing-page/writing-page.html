<div class="writing-page" appReveal>
  <app-divider [title]="'Writing'" />

  <p class="page-intro">
    Blog posts, research notes, and things I've been learning along the way.
  </p>

  <ng-template #noPosts>
    <p class="empty-state">Nothing published yet — check back soon.</p>
  </ng-template>

  <app-divider [title]="'From LinkedIn'" />

  <ul class="entries" *ngIf="linkedinPosts.length; else noLinkedIn">
    <li *ngFor="let post of linkedinPosts">
      <a class="entry-link" [href]="post.url" target="_blank" rel="noopener">
        <span class="entry-tag">LinkedIn</span>
        <p class="entry-summary">{{ post.caption }}</p>
        <span class="entry-date">{{ post.date }}</span>
      </a>
    </li>
  </ul>
  <ng-template #noLinkedIn>
    <!-- <p class="empty-state">LinkedIn posts will show up here once added.</p>
      -->
    <iframe src="https://widgets.sociablekit.com/linkedin-profile-posts/iframe/25696146" frameborder="0" width="100%" height="1000px"></iframe>
  </ng-template>
</div>
